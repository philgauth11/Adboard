{% extends "base.html" %}
{% block title %}Changer mon mot de passe{% endblock %}
{% block content %}
<div style="max-width:400px;margin:60px auto;">
  <h2 style="margin-bottom:24px;">Changer mon mot de passe</h2>
  {% if error %}
    <div class="flash-error">{{ error }}</div>
  {% endif %}
  <form method="POST" style="display:flex;flex-direction:column;gap:16px;">
    <div>
      <label class="label">Mot de passe actuel</label>
      <input class="input" type="password" name="current_password" required autofocus>
    </div>
    <div>
      <label class="label">Nouveau mot de passe</label>
      <input class="input" type="password" name="new_password" required minlength="8">
    </div>
    <div>
      <label class="label">Confirmer le nouveau mot de passe</label>
      <input class="input" type="password" name="confirm_password" required>
    </div>
    <button class="btn btn-primary" type="submit">Enregistrer</button>
    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline" style="text-align:center;">Annuler</a>
  </form>
</div>
{% endblock %}
